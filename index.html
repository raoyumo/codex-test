<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yumo Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="intro">
        <div class="title-row">
          <h1>Yumo Calculator</h1>
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌙 Dark</button>
        </div>
        <p>My first Codex project</p>
      </header>

      <section class="calculator" aria-label="Calculator">
        <div id="display" class="display">0</div>

        <div class="buttons">
          <button class="btn btn-clear" data-value="C">C</button>
          <button class="btn btn-backspace" data-value="backspace">⌫</button>
          <button class="btn" data-value="plus-minus">±</button>
          <button class="btn" data-value="percent">%</button>

          <button class="btn" data-value="7">7</button>
          <button class="btn" data-value="8">8</button>
          <button class="btn" data-value="9">9</button>
          <button class="btn" data-value="/">/</button>

          <button class="btn" data-value="4">4</button>
          <button class="btn" data-value="5">5</button>
          <button class="btn" data-value="6">6</button>
          <button class="btn" data-value="*">*</button>

          <button class="btn" data-value="1">1</button>
          <button class="btn" data-value="2">2</button>
          <button class="btn" data-value="3">3</button>
          <button class="btn" data-value="-">-</button>

          <button class="btn btn-zero" data-value="0">0</button>
          <button class="btn" data-value=".">.</button>
          <button class="btn" data-value="=">=</button>
          <button class="btn" data-value="+">+</button>
        </div>
      </section>

      <section class="history" aria-label="Calculation history">
        <div class="history-header">
          <h2>History</h2>
          <button id="clear-history" class="clear-history">Clear</button>
        </div>
        <ul id="history-list" class="history-list">
          <li class="history-empty">No calculations yet.</li>
        </ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
