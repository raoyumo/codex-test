<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的第一个 Codex 网页</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>简单计算器练习</h1>
      <p>请输入两个数字，然后点击运算按钮查看结果。</p>

      <div class="calculator">
        <input id="num1" type="text" placeholder="第一个数字" />
        <input id="num2" type="text" placeholder="第二个数字" />

        <div class="buttons">
          <button id="add-btn">加法</button>
          <button id="sub-btn">减法</button>
          <button id="mul-btn">乘法</button>
          <button id="div-btn">除法</button>
        </div>

        <p id="result">结果：请先输入数字</p>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
