<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>初学者计算器</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>简单计算器</h1>
      <p>输入两个数字，然后点击下面的按钮进行计算。</p>

      <div class="inputs">
        <label for="number-a">数字 1：</label>
        <input id="number-a" type="text" placeholder="例如：10" />

        <label for="number-b">数字 2：</label>
        <input id="number-b" type="text" placeholder="例如：5" />
      </div>

      <div class="buttons">
        <button id="add-btn">加法</button>
        <button id="subtract-btn">减法</button>
        <button id="multiply-btn">乘法</button>
        <button id="divide-btn">除法</button>
        <button id="clear-btn">清空</button>
      </div>

      <p id="message" class="message">结果：请先输入数字。</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
